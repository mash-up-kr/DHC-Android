name: Figma UI Validation

on:
  pull_request:
    branches: [ "develop", "main" ]
    paths:
      - 'presentation/**/*.kt'
      - 'core/designsystem/**/*.kt'
      - 'scripts/figma_specs/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Figma UI Validation
        run: python3 scripts/validate_ui.py

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: figma-validation-report
          path: build/reports/figma-validation/report.html
          retention-days: 14

      - name: Comment PR with result
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            let summary = '';
            try {
              const output = execSync('python3 scripts/validate_ui.py 2>&1', { encoding: 'utf8' });
              const lines = output.trim().split('\n');
              const passed = lines.filter(l => l.includes('✅')).length - 1;
              const failed = lines.filter(l => l.includes('❌')).length;
              const icon = failed > 0 ? '❌' : '✅';
              summary = lines.join('\n');

              const body = [
                `## ${icon} Figma UI Validation`,
                '```',
                summary,
                '```',
                '',
                `> 상세 리포트는 Actions 탭 → **figma-validation-report** artifact에서 확인하세요.`,
              ].join('\n');

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } catch (e) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ❌ Figma UI Validation 실패\n\`\`\`\n${e.stdout || e.message}\n\`\`\``,
              });
            }
